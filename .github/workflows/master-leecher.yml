name: 👑 Master All-in-One Leecher (WAF-Buster Engine)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه ویدیو (هر سایتی که هست)'
        required: true
      quality:
        description: 'کیفیت دانلود'
        required: true
        type: choice
        options:
          - best
          - 720
          - 480
          - 360
          - lowest
        default: best

permissions:
  contents: write

jobs:
  master_smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools & yt-dlp
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3 python3-pip
          python3 -m pip install playwright
          # نصب کتابخانه دور زدن کلودفلر
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git" curl_cffi
          python3 -m playwright install --with-deps chromium

      - name: Emulate iPhone & Extract Live Cookies
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
        run: |
          echo "🚀 Step 1: Sniffing network and extracting LIVE cookies for $INPUT_QUALITY..."
          
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys

          target_url = sys.argv[1]
          target_q = sys.argv[2]
          target_url = target_url.replace('m.yeptube.net', 'www.yeptube.net')
          found_links = set()

          def handle_response(response):
              try:
                  url = response.url
                  if ('.mp4' in url or '.m3u8' in url):
                      url_lower = url.lower()
                      if 'preview' not in url_lower and 'thumb' not in url_lower and 'teaser' not in url_lower:
                          found_links.add(url)
              except:
                  pass

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              iphone_13 = p.devices['iPhone 13']
              context = browser.new_context(**iphone_13)
              page = context.new_page()
              page.on("response", handle_response)
              
              try:
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  video_src = page.evaluate('() => { const v = document.querySelector("video"); return v ? v.src : null; }')
                  if video_src and '.mp4' in video_src:
                      found_links.add(video_src)
                      
                  page.mouse.click(200, 200)
                  page.wait_for_timeout(5000)
              except:
                  pass
              
              cookies = context.cookies()
              
              # خروجی اول: فرمت Netscape برای yt-dlp (استریم‌های m3u8)
              with open('pw_cookies.txt', 'w', encoding='utf-8') as f:
                  f.write("# Netscape HTTP Cookie File\n")
                  for c in cookies:
                      domain = c['domain']
                      flag = "TRUE" if domain.startswith('.') else "FALSE"
                      path = c['path']
                      secure = "TRUE" if c['secure'] else "FALSE"
                      expires = int(c.get('expires', 0))
                      if expires <= 0 or expires < 1700000000:
                          expires = 2147483647 # تمدید تا سال ۲۰۳۸
                      f.write(f"{domain}\t{flag}\t{path}\t{secure}\t{expires}\t{c['name']}\t{c['value']}\n")
              
              # خروجی دوم: هدر خام برای دانلودر اختصاصی ما (فایل‌های mp4)
              cookie_str = "; ".join([f"{c['name']}={c['value']}" for c in cookies])
              with open('pw_cookie_header.txt', 'w', encoding='utf-8') as f:
                  f.write(cookie_str)
              
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              mp4_links = [l for l in found_links if '.mp4' in l and 'preview' not in l.lower()]
              if mp4_links:
                  hq_links = [l for l in mp4_links if 'hq' in l.lower()]
                  lq_links = [l for l in mp4_links if 'lq' in l.lower()]
                  
                  if target_q in ['best', '720']:
                      print(max(hq_links if hq_links else mp4_links, key=len))
                  elif target_q in ['lowest', '360', '480']:
                      print(max(lq_links if lq_links else mp4_links, key=len))
                  else:
                      print(max(mp4_links, key=len))
              else:
                  m3u8_links = [l for l in found_links if '.m3u8' in l]
                  if m3u8_links:
                      if target_q == 'best':
                          c = [l for l in m3u8_links if '1080' in l] or [l for l in m3u8_links if '720' in l] or [l for l in m3u8_links if '480' in l] or m3u8_links
                      elif target_q == 'lowest':
                          c = [l for l in m3u8_links if '160' in l] or [l for l in m3u8_links if '240' in l] or [l for l in m3u8_links if '360' in l] or m3u8_links
                      else:
                          c = [l for l in m3u8_links if target_q in l]
                          if not c:
                              c = [l for l in m3u8_links if '480' in l] or m3u8_links
                      print(c[0])
                  else:
                      print("NOT_FOUND")
          EOF

          DIRECT_LINK=$(python3 scraper.py "$INPUT_URL" "$INPUT_QUALITY")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ لینکی یافت نشد. سایت دسترسی ربات را مسدود کرده است."
            exit 1
          fi
          
          echo "✅ TARGET LOCKED [$INPUT_QUALITY]: $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: Custom 16-Thread WAF Bypass Download
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          echo "🚀 Step 2: Choosing Engine and Bypassing WAF Firewalls..."
          
          if [[ "${{ env.DIRECT_LINK }}" == *".mp4"* ]]; then
            echo "🎬 Direct MP4 -> Using Custom Python WAF-Buster (16 Threads)..."
            
            # اسکریپت دانلودر قدرتمند و اختصاصی ما برای دور زدن کامل فایروال
            cat << 'EOF' > custom_downloader.py
          import sys, os
          from curl_cffi import requests
          from concurrent.futures import ThreadPoolExecutor

          url = sys.argv[1]
          referer = sys.argv[2]
          with open('pw_cookie_header.txt', 'r') as f:
              cookie = f.read().strip()

          headers = {
              "User-Agent": "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1",
              "Referer": referer,
              "Cookie": cookie,
              "Accept": "*/*"
          }

          print("📡 Connecting to server stealthily...")
          # استفاده از Range برای دور زدن بلاک بودن درخواست HEAD در فایروال‌ها
          headers["Range"] = "bytes=0-0"
          resp = requests.get(url, headers=headers, impersonate="safari", stream=True)
          
          if resp.status_code >= 400:
              print(f"❌ Server rejected our sneaky connection (Status {resp.status_code}).")
              sys.exit(1)

          file_size = int(resp.headers.get("Content-Range", "").split("/")[-1] if "Content-Range" in resp.headers else resp.headers.get("Content-Length", 0))

          if file_size == 0:
              print("⚠️ Could not determine file size. Downloading single-threaded as fallback...")
              r = requests.get(url, headers={k:v for k,v in headers.items() if k!="Range"}, impersonate="safari", stream=True)
              with open("video_raw.mp4", "wb") as f:
                  for chunk in r.iter_content(chunk_size=1024*1024):
                      if chunk: f.write(chunk)
              sys.exit(0)

          print(f"📦 Payload Target Size: {file_size / (1024*1024):.2f} MB")
          print("⚡ Engaging 16 concurrent threads...")
          
          threads = 16
          chunk_size = file_size // threads
          ranges = []
          for i in range(threads):
              start = i * chunk_size
              end = start + chunk_size - 1 if i < threads - 1 else file_size - 1
              ranges.append((start, end, i))

          def download_chunk(rng):
              start, end, idx = rng
              h = headers.copy()
              h["Range"] = f"bytes={start}-{end}"
              r = requests.get(url, headers=h, impersonate="safari", stream=True)
              with open(f"part_{idx}", "wb") as f:
                  for chunk in r.iter_content(chunk_size=1024*1024):
                      if chunk: f.write(chunk)
              print(f"✅ Downloaded block {idx+1}/16")

          with ThreadPoolExecutor(max_workers=threads) as executor:
              executor.map(download_chunk, ranges)

          print("🔗 Assembling video fragments...")
          with open("video_raw.mp4", "wb") as outfile:
              for i in range(threads):
                  part_file = f"part_{i}"
                  if os.path.exists(part_file):
                      with open(part_file, "rb") as infile:
                          outfile.write(infile.read())
                      os.remove(part_file)
          print("🎉 Target acquired successfully!")
          EOF
            
            # اجرای دانلودر اختصاصی
            python3 custom_downloader.py "${{ env.DIRECT_LINK }}" "$INPUT_URL"
            
          else
            echo "🎥 HLS Playlist -> Using yt-dlp Native Engine with WAF Bypass..."
            yt-dlp \
              -N 16 \
              --cookies "pw_cookies.txt" \
              --impersonate "safari" \
              --downloader "m3u8:native" \
              --referer="$INPUT_URL" \
              --user-agent="Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1" \
              --no-check-certificate \
              --remux-video mp4 \
              -o "video_dl.%(ext)s" \
              "${{ env.DIRECT_LINK }}"
              
            mv video_dl.* video_raw.mp4
          fi

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            echo "✅ Fixing timeline index..."
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ فایل دانلود نشده است."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          echo "✂️ Splitting files into 90MB chunks..."
          FOLDER_NAME="downloads/master-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to GitHub Code
        run: |
          echo "📤 Uploading to Repository..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "🚀 Master Download [${{ github.event.inputs.quality }}]: ${{ github.run_id }}"
          git push
