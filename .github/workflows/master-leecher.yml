name: 👑 Master All-in-One Leecher (Ultimate WAF-Buster)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه ویدیو (Yeptube, EroASMR و غیره)'
        required: true
      quality:
        description: 'کیفیت دانلود'
        required: true
        type: choice
        options:
          - best
          - 720
          - 480
          - 360
          - lowest
        default: best

permissions:
  contents: write

jobs:
  master_smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools & Advanced Libraries
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full python3 python3-pip
          python3 -m pip install playwright curl_cffi
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"
          python3 -m playwright install --with-deps chromium

      - name: Sniff Network, Clone Headers & Extract Links
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
        run: |
          echo "🚀 Step 1: Analyzing Site & Cloning Active Identity for $INPUT_QUALITY..."
          
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys, json

          target_url = sys.argv[1]
          target_q = sys.argv[2]
          target_url = target_url.replace('m.yeptube.net', 'www.yeptube.net')
          found_links = set()
          cloned_headers = {}

          def handle_response(response):
              try:
                  url = response.url
                  if ('.mp4' in url or '.m3u8' in url):
                      url_lower = url.lower()
                      if 'preview' not in url_lower and 'thumb' not in url_lower and 'teaser' not in url_lower:
                          found_links.add(url)
                          cloned_headers[url] = response.request.all_headers()
              except:
                  pass

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/110.0.0.0 Safari/537.36"
              )
              page = context.new_page()
              page.on("response", handle_response)
              
              try:
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  page.mouse.click(200, 200)
                  page.wait_for_timeout(6000)
              except:
                  pass
              
              # خروجی کوکی‌ها برای موتور m3u8
              cookies = context.cookies()
              with open('pw_cookies.txt', 'w', encoding='utf-8') as f:
                  f.write("# Netscape HTTP Cookie File\n")
                  for c in cookies:
                      domain = c['domain']
                      flag = "TRUE" if domain.startswith('.') else "FALSE"
                      path = c['path']
                      secure = "TRUE" if c['secure'] else "FALSE"
                      expires = int(c.get('expires', 0))
                      if expires <= 0 or expires < 1700000000:
                          expires = 2147483647
                      f.write(f"{domain}\t{flag}\t{path}\t{secure}\t{expires}\t{c['name']}\t{c['value']}\n")
              
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              mp4_links = [l for l in found_links if '.mp4' in l and 'preview' not in l.lower()]
              m3u8_links = [l for l in found_links if '.m3u8' in l]
              
              best_link = None
              
              if mp4_links:
                  hq_links = [l for l in mp4_links if 'hq' in l.lower()]
                  lq_links = [l for l in mp4_links if 'lq' in l.lower()]
                  
                  if target_q in ['best', '720']:
                      best_link = max(hq_links if hq_links else mp4_links, key=len)
                  elif target_q in ['lowest', '360', '480']:
                      best_link = max(lq_links if lq_links else mp4_links, key=len)
                  else:
                      best_link = max(mp4_links, key=len)
              elif m3u8_links:
                  if target_q == 'best':
                      c = [l for l in m3u8_links if '1080' in l] or [l for l in m3u8_links if '720' in l] or [l for l in m3u8_links if '480' in l] or m3u8_links
                  elif target_q == 'lowest':
                      c = [l for l in m3u8_links if '160' in l] or [l for l in m3u8_links if '240' in l] or [l for l in m3u8_links if '360' in l] or m3u8_links
                  else:
                      c = [l for l in m3u8_links if target_q in l]
                      if not c:
                          c = [l for l in m3u8_links if '480' in l] or m3u8_links
                  best_link = c[0]
              
              if best_link:
                  print(best_link)
                  with open('headers.json', 'w', encoding='utf-8') as f:
                      json.dump(cloned_headers.get(best_link, {}), f)
              else:
                  print("NOT_FOUND")
          EOF

          DIRECT_LINK=$(python3 scraper.py "$INPUT_URL" "$INPUT_QUALITY")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ استخراج لینک ناموفق بود. مسدود توسط فایروال یا عدم وجود ویدیو."
            exit 1
          fi
          
          echo "✅ TARGET LOCKED: $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: High-Speed Custom Multi-Engine Download
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          echo "🚀 Step 2: Engaging Smart Download Engine..."
          
          if [[ "${{ env.DIRECT_LINK }}" == *".mp4"* ]]; then
            echo "🎬 Direct MP4 Detected -> Using Custom Python 16-Thread WAF-Buster!"
            
            cat << 'EOF' > custom_downloader.py
          import sys, os, json
          from curl_cffi import requests
          from concurrent.futures import ThreadPoolExecutor

          url = sys.argv[1]
          
          with open('headers.json', 'r') as f:
              headers = json.load(f)

          # پاکسازی هدرهای مداخله‌گر
          for k in ['range', 'accept-encoding', 'content-length']:
              headers.pop(k, None)
              headers.pop(k.lower(), None)

          print("📡 Doing a stealth GET using exact Browser Headers...")
          session = requests.Session(impersonate="chrome110")
          resp = session.get(url, headers=headers, stream=True)
          
          if resp.status_code >= 400:
              print(f"❌ WAF Blocked us! Status: {resp.status_code}")
              sys.exit(1)

          file_size = int(resp.headers.get("Content-Length", 0))
          resp.close()

          if file_size == 0:
              print("⚠️ File size unknown. Downloading single-thread...")
              r = session.get(url, headers=headers, stream=True)
              with open("video_raw.mp4", "wb") as f:
                  for chunk in r.iter_content(chunk_size=1024*1024):
                      if chunk: f.write(chunk)
              print("🎉 Download Finished!")
              sys.exit(0)

          print(f"✅ WAF Bypassed! Target Size: {file_size / (1024*1024):.2f} MB")
          
          threads = 16
          chunk_size = file_size // threads
          ranges = []
          for i in range(threads):
              start = i * chunk_size
              end = start + chunk_size - 1 if i < threads - 1 else file_size - 1
              ranges.append((start, end, i))

          def download_chunk(rng):
              start, end, idx = rng
              h = headers.copy()
              h["Range"] = f"bytes={start}-{end}"
              for attempt in range(3):
                  try:
                      r = session.get(url, headers=h, stream=True, timeout=15)
                      with open(f"part_{idx}", "wb") as f:
                          for chunk in r.iter_content(chunk_size=1024*1024):
                              if chunk: f.write(chunk)
                      print(f"✅ Chunk {idx+1}/16 complete.")
                      break
                  except:
                      pass

          with ThreadPoolExecutor(max_workers=threads) as executor:
              executor.map(download_chunk, ranges)

          print("🔗 Assembling video fragments...")
          with open("video_raw.mp4", "wb") as outfile:
              for i in range(threads):
                  part_file = f"part_{i}"
                  if os.path.exists(part_file):
                      with open(part_file, "rb") as infile:
                          outfile.write(infile.read())
                      os.remove(part_file)
          print("🎉 Download 100% Successful.")
          EOF
            
            python3 custom_downloader.py "${{ env.DIRECT_LINK }}"
            
          else
            echo "🎥 HLS Playlist Detected -> Using yt-dlp Native Engine..."
            yt-dlp \
              -N 16 \
              --cookies "pw_cookies.txt" \
              --impersonate "chrome110" \
              --downloader "m3u8:native" \
              --referer="$INPUT_URL" \
              --no-check-certificate \
              --remux-video mp4 \
              -o "video_dl.%(ext)s" \
              "${{ env.DIRECT_LINK }}"
              
            mv video_dl.* video_raw.mp4
          fi

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            echo "✅ Fixing timeline index..."
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ فایل دانلود نشده است."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          echo "✂️ Splitting files into 90MB chunks..."
          FOLDER_NAME="downloads/master-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to GitHub Code
        run: |
          echo "📤 Uploading to Repository..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "🚀 Master Download [${{ github.event.inputs.quality }}]: ${{ github.run_id }}"
          git push
