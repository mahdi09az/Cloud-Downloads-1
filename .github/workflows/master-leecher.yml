name: 👑 Master All-in-One Leecher (Yeptube, EroASMR, etc)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه ویدیو (هر سایتی که هست)'
        required: true
      quality:
        description: 'کیفیت دانلود'
        required: true
        type: choice
        options:
          - best
          - 720
          - 480
          - 360
          - lowest
        default: best

permissions:
  contents: write

jobs:
  master_smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools & yt-dlp Nightly
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3 python3-pip
          python3 -m pip install playwright
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"
          python3 -m playwright install --with-deps chromium

      - name: Emulate iPhone & Extract Link (Smart Engine)
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
        run: |
          echo "🚀 Step 1: Analyzing site and sniffing network for $INPUT_QUALITY quality..."
          
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys

          target_url = sys.argv[1]
          target_q = sys.argv[2]
          # ترفند اختصاصی برای Yeptube (روی سایت‌های دیگر اثری ندارد)
          target_url = target_url.replace('m.yeptube.net', 'www.yeptube.net')
          found_links = set()

          def handle_response(response):
              try:
                  url = response.url
                  if ('.mp4' in url or '.m3u8' in url):
                      url_lower = url.lower()
                      if 'preview' not in url_lower and 'thumb' not in url_lower and 'teaser' not in url_lower:
                          found_links.add(url)
              except:
                  pass

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              # شبیه‌سازی آیفون ۱۳ برای دریافت لینک‌های مستقیم از سایت‌های سخت‌گیر
              iphone_13 = p.devices['iPhone 13']
              context = browser.new_context(**iphone_13)
              page = context.new_page()
              page.on("response", handle_response)
              
              try:
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  video_src = page.evaluate('() => { const v = document.querySelector("video"); return v ? v.src : null; }')
                  if video_src and '.mp4' in video_src:
                      found_links.add(video_src)
                      
                  page.mouse.click(200, 200)
                  page.wait_for_timeout(5000)
              except:
                  pass
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              # فیلتر هوشمند کیفیت
              mp4_links = [l for l in found_links if '.mp4' in l and 'preview' not in l.lower()]
              if mp4_links:
                  hq_links = [l for l in mp4_links if 'hq' in l.lower()]
                  lq_links = [l for l in mp4_links if 'lq' in l.lower()]
                  
                  if target_q in ['best', '720']:
                      print(max(hq_links if hq_links else mp4_links, key=len))
                  elif target_q in ['lowest', '360', '480']:
                      print(max(lq_links if lq_links else mp4_links, key=len))
                  else:
                      print(max(mp4_links, key=len))
              else:
                  m3u8_links = [l for l in found_links if '.m3u8' in l]
                  if m3u8_links:
                      if target_q == 'best':
                          c = [l for l in m3u8_links if '1080' in l] or [l for l in m3u8_links if '720' in l] or [l for l in m3u8_links if '480' in l] or m3u8_links
                      elif target_q == 'lowest':
                          c = [l for l in m3u8_links if '160' in l] or [l for l in m3u8_links if '240' in l] or [l for l in m3u8_links if '360' in l] or m3u8_links
                      else:
                          c = [l for l in m3u8_links if target_q in l]
                          if not c:
                              c = [l for l in m3u8_links if '480' in l] or m3u8_links
                      print(c[0])
                  else:
                      print("NOT_FOUND")
          EOF

          DIRECT_LINK=$(python3 scraper.py "$INPUT_URL" "$INPUT_QUALITY")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ لینکی یافت نشد. سایت دسترسی ربات را مسدود کرده است."
            exit 1
          fi
          
          echo "✅ TARGET LOCKED [$INPUT_QUALITY]: $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: High-Speed Multi-Engine Download
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          COOKIES_TXT: ${{ secrets.PH_COOKIES }}
        run: |
          echo "🚀 Step 2: Choosing Best Download Engine..."
          
          if [ ! -z "$COOKIES_TXT" ]; then
            echo "$COOKIES_TXT" > cookies.txt
            ARIA_COOKIE="--load-cookies=cookies.txt"
            YTDLP_COOKIE="--cookies cookies.txt"
          else
            ARIA_COOKIE=""
            YTDLP_COOKIE=""
          fi
          
          if [[ "${{ env.DIRECT_LINK }}" == *".mp4"* ]]; then
            echo "🎬 Direct MP4 -> Using Aria2c (16 Threads)..."
            aria2c -x 16 -s 16 -k 1M $ARIA_COOKIE \
              --referer="$INPUT_URL" \
              --user-agent="Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1" \
              --check-certificate=false \
              -o "video_raw.mp4" \
              "${{ env.DIRECT_LINK }}"
          else
            echo "🎥 HLS Playlist -> Using yt-dlp Native Engine (16 Threads)..."
            yt-dlp \
              -N 16 \
              $YTDLP_COOKIE \
              --downloader "m3u8:native" \
              --referer="$INPUT_URL" \
              --user-agent="Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1" \
              --no-check-certificate \
              --remux-video mp4 \
              -o "video_dl.%(ext)s" \
              "${{ env.DIRECT_LINK }}"
              
            mv video_dl.* video_raw.mp4
          fi
          
          rm -f cookies.txt

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            echo "✅ Fixing timeline index..."
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ فایل دانلود نشده است."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          echo "✂️ Splitting files into 90MB chunks..."
          FOLDER_NAME="downloads/master-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to GitHub Code
        run: |
          echo "📤 Uploading to Repository..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "🚀 Master Download [${{ github.event.inputs.quality }}]: ${{ github.run_id }}"
          git push
