name: 🧠 Smart Scraper (Weight Radar v3)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس اصلی صفحه ویدیو'
        required: true

permissions:
  contents: write

jobs:
  smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3 python3-pip
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"

      - name: Extract and Weigh Links
        run: |
          echo "🚀 Step 1: Scanning and weighing all video files..."
          
          cat << 'EOF' > scraper.py
          import urllib.request
          import re
          import sys

          page_url = sys.argv[1]
          page_url = page_url.replace('m.yeptube.net', 'www.yeptube.net')
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36',
              'Referer': page_url
          }

          try:
              req = urllib.request.Request(page_url, headers=headers)
              html = urllib.request.urlopen(req).read().decode('utf-8', errors='ignore')
              html = html.replace('\\/', '/')

              # پیدا کردن تمام لینک‌های mp4 و m3u8
              links = re.findall(r'(https?://[^\s"\'<>]+?\.(?:mp4|m3u8)[^\s"\'<>]*)', html)
              links = list(set(links)) # حذف لینک‌های تکراری

              best_link = "NOT_FOUND"
              max_size = 0

              for link in links:
                  # اگر لینک لیست‌پخش m3u8 باشد، همیشه اولویت دارد
                  if '.m3u8' in link:
                      best_link = link
                      break
                  
                  # وزن‌کشی فایل‌های mp4 با ارسال درخواست HEAD
                  try:
                      head_req = urllib.request.Request(link, headers=headers, method='HEAD')
                      res = urllib.request.urlopen(head_req, timeout=5)
                      size = int(res.headers.get('Content-Length', 0))
                      
                      # انتخاب فایلی که بیشترین حجم را دارد
                      if size > max_size:
                          max_size = size
                          best_link = link
                  except:
                      continue

              print(best_link)
          except Exception as e:
              print("ERROR")
          EOF

          DIRECT_LINK=$(python3 scraper.py "${{ github.event.inputs.url }}")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ هیچ لینک معتبری در سایت یافت نشد."
            exit 1
          fi
          
          echo "✅ TARGET LOCKED: The heaviest file is -> $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: Download Main Video
        run: |
          echo "🚀 Step 2: Downloading with yt-dlp + Aria2 Backend..."
          # در اینجا از yt-dlp استفاده می‌کنیم تا اگر فایل اصلی m3u8 بود، به درستی هندل شود
          yt-dlp \
            --downloader aria2c \
            --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
            --referer "${{ github.event.inputs.url }}" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --allow-unplayable-formats \
            --no-check-certificate \
            -o "video_raw.mp4" \
            "${{ env.DIRECT_LINK }}"

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            echo "✅ Fixing video timestamps..."
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ دانلود انجام نشد."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/smart-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Smart Scraper V3: ${{ github.run_id }}"
          git push
