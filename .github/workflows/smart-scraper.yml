name: 🧠 Smart Scraper (IP-Lock Bypass v2)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه ویدیو (مثال: https://www.yeptube.net/video/...)'
        required: true

permissions:
  contents: write

jobs:
  smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3

      - name: Extract Link and Download
        run: |
          echo "🚀 Step 1: Fetching page as GitHub Runner..."
          
          # اسکریپت پایتون ارتقایافته برای فیلتر تیزرها و یافتن لینک اصلی
          cat << 'EOF' > scraper.py
          import urllib.request
          import re
          import sys

          url = sys.argv[1]
          url = url.replace('m.yeptube.net', 'www.yeptube.net') 
          
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36'})
          try:
              html = urllib.request.urlopen(req).read().decode('utf-8', errors='ignore')
              html = html.replace('\\/', '/')
              
              # استخراج تمام لینک‌های mp4
              links = re.findall(r'(https?://[^\s"\'<>]+?\.mp4[^\s"\'<>]*)', html)
              
              # فیلتر کردن لینک‌های تیزر، پیش‌نمایش و تبلیغات
              valid_links = [l for l in links if 'preview' not in l.lower() and 'thumb' not in l.lower()]
              
              if valid_links:
                  # انتخاب طولانی‌ترین لینک (لینک اصلی حاوی توکن‌های md5 و expire است)
                  best_link = max(valid_links, key=len)
                  print(best_link)
              else:
                  print("NOT_FOUND")
          except Exception as e:
              print("ERROR")
          EOF

          DIRECT_LINK=$(python3 scraper.py "${{ github.event.inputs.url }}")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ استخراج لینک شکست خورد. ممکن است ویدیو نیاز به لاگین داشته باشد یا با Cloudflare مسدود شده باشد."
            exit 1
          fi
          
          echo "✅ Found Main Video Link: $DIRECT_LINK"
          
          echo "🚀 Step 2: Downloading with Aria2..."
          aria2c -x 16 -s 16 -k 1M \
            --referer="${{ github.event.inputs.url }}" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --check-certificate=false \
            -o "video_raw.mp4" \
            "$DIRECT_LINK"

      - name: Fix Video Index (FastStart)
        run: |
          echo "✅ Fixing video timestamps..."
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          rm video_raw.mp4

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/smart-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Smart Scraper V2: ${{ github.run_id }}"
          git push
