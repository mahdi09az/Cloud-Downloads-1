name: 🧠 Smart Scraper (IP-Lock Bypass)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه ویدیو (لینک مستقیم ندهید، لینک خود صفحه را بدهید)'
        required: true

permissions:
  contents: write

jobs:
  smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3

      - name: Extract Link and Download
        run: |
          echo "🚀 Step 1: Fetching page as GitHub Runner..."
          
          # نوشتن یک اسکریپت پایتون سریع برای خواندن سورس سایت و پیدا کردن لینک آی‌پی-قفل شده
          cat << 'EOF' > scraper.py
          import urllib.request
          import re
          import sys

          url = sys.argv[1]
          # تغییر User-Agent به مرورگر کامپیوتر برای دریافت کیفیت بهتر
          url = url.replace('m.yeptube.net', 'www.yeptube.net') 
          
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
          try:
              html = urllib.request.urlopen(req).read().decode('utf-8', errors='ignore')
              # اصلاح اسلش‌های جاوااسکریپتی
              html = html.replace('\\/', '/')
              
              # جستجوی لینک‌های ویدیویی mp4 در سورس کد
              links = re.findall(r'(https?://[^\s"\'<>]+?\.mp4[^\s"\'<>]*)', html)
              
              if links:
                  # چاپ اولین لینک معتبر یافت شده
                  print(links[0])
              else:
                  print("NOT_FOUND")
          except Exception as e:
              print("ERROR")
          EOF

          # اجرای اسکریپت و ذخیره خروجی
          DIRECT_LINK=$(python3 scraper.py "${{ github.event.inputs.url }}")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ نتوانستم لینک ویدیو را در سورس صفحه پیدا کنم. ممکن است سایت دارای سیستم ضد-ربات ابری (Cloudflare) باشد."
            exit 1
          fi
          
          echo "✅ Found fresh IP-locked link: $DIRECT_LINK"
          
          echo "🚀 Step 2: Downloading with Aria2..."
          # دانلود لینک یافت شده (چون توسط خود سرور پیدا شده، مشکل آی‌پی نخواهد داشت)
          aria2c -x 16 -s 16 -k 1M \
            --referer="${{ github.event.inputs.url }}" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
            --check-certificate=false \
            -o "video_raw.mp4" \
            "$DIRECT_LINK"

      - name: Fix Video Index (FastStart)
        run: |
          echo "✅ Fixing video timestamps..."
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          rm video_raw.mp4

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/smart-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Smart Scraper Download: ${{ github.run_id }}"
          git push
