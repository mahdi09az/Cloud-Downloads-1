name: 🧠 Smart Scraper (Playwright Ultimate)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس اصلی صفحه ویدیو'
        required: true

permissions:
  contents: write

jobs:
  smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3 python3-pip

      - name: Install Playwright & yt-dlp
        run: |
          python3 -m pip install playwright yt-dlp
          # نصب مرورگر کرومیوم برای ربات
          python3 -m playwright install --with-deps chromium

      - name: Sniff Network for Main Video
        run: |
          echo "🚀 Step 1: Launching Virtual Browser to bypass JS & IP Locks..."
          
          # اسکریپت پایتون با استفاده از Playwright برای شنود ترافیک شبکه مرورگر
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys
          import time

          target_url = sys.argv[1]
          target_url = target_url.replace('m.yeptube.net', 'www.yeptube.net')
          
          found_links = set()

          def handle_response(response):
              try:
                  url = response.url
                  # اگر درخواست مربوط به فایل ویدیویی بود
                  if ('.mp4' in url or '.m3u8' in url):
                      url_lower = url.lower()
                      # فیلتر کردن فایل‌های تیزر و پیش‌نمایش
                      if 'preview' not in url_lower and 'thumb' not in url_lower and 'teaser' not in url_lower:
                          found_links.add(url)
              except:
                  pass

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              # ساخت یک تب مرورگر با تنظیمات یک کامپیوتر واقعی
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36",
                  viewport={"width": 1920, "height": 1080}
              )
              page = context.new_page()
              
              # روشن کردن رادار برای شنود پاسخ‌های شبکه
              page.on("response", handle_response)
              
              try:
                  # رفتن به سایت و صبر کردن تا زمانی که لود شبکه آرام شود
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  # شبیه‌سازی کلیک روی صفحه برای تحریک سایت‌هایی که پلیر را تا زمان کلیک مخفی نگه می‌دارند
                  page.mouse.click(500, 500)
                  page.wait_for_timeout(5000)
              except Exception as e:
                  # تایم‌اوت در سایت‌های دارای تبلیغات سنگین طبیعی است، از آن عبور می‌کنیم
                  pass
              
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              # اولویت اول: پیدا کردن لینک‌های استریم m3u8
              m3u8_links = [l for l in found_links if '.m3u8' in l]
              if m3u8_links:
                  print(m3u8_links[0])
              else:
                  # اولویت دوم: استخراج طولانی‌ترین لینک mp4 (چون شامل توکن‌های md5 است)
                  print(max(found_links, key=len))
          EOF

          DIRECT_LINK=$(python3 scraper.py "${{ github.event.inputs.url }}")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ مرورگر مجازی نتوانست ترافیک ویدیو را شنود کند."
            exit 1
          fi
          
          echo "✅ TARGET LOCKED (Playwright): $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: Download Main Video
        run: |
          echo "🚀 Step 2: Downloading the extracted secure link..."
          yt-dlp \
            --downloader aria2c \
            --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
            --referer "${{ github.event.inputs.url }}" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --allow-unplayable-formats \
            --no-check-certificate \
            -o "video_raw.mp4" \
            "${{ env.DIRECT_LINK }}"

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            echo "✅ Fixing video timestamps..."
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ دانلود انجام نشد."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/smart-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Smart Playwright Scraper: ${{ github.run_id }}"
          git push
