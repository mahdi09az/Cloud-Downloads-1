name: 🚀 HQ Direct Leecher (iPhone Bypass)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس اصلی صفحه ویدیو (لینک مرورگر)'
        required: true

permissions:
  contents: write

jobs:
  hq_smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools & yt-dlp Nightly
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2 python3 python3-pip
          python3 -m pip install playwright
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"
          python3 -m playwright install --with-deps chromium

      - name: Emulate iPhone & Extract Direct MP4
        run: |
          echo "🚀 Step 1: Emulating iPhone 13 to force Direct MP4 link..."
          
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys

          target_url = sys.argv[1]
          target_url = target_url.replace('m.yeptube.net', 'www.yeptube.net')
          found_links = set()

          def handle_response(response):
              try:
                  url = response.url
                  if ('.mp4' in url or '.m3u8' in url):
                      url_lower = url.lower()
                      if 'preview' not in url_lower and 'thumb' not in url_lower and 'teaser' not in url_lower:
                          found_links.add(url)
              except:
                  pass

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              iphone_13 = p.devices['iPhone 13']
              context = browser.new_context(**iphone_13)
              page = context.new_page()
              page.on("response", handle_response)
              
              try:
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  video_src = page.evaluate('() => { const v = document.querySelector("video"); return v ? v.src : null; }')
                  if video_src and '.mp4' in video_src:
                      found_links.add(video_src)
                      
                  page.mouse.click(200, 200)
                  page.wait_for_timeout(5000)
              except:
                  pass
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              mp4_links = [l for l in found_links if '.mp4' in l and 'preview' not in l.lower()]
              if mp4_links:
                  print(max(mp4_links, key=len))
              else:
                  m3u8_links = [l for l in found_links if '.m3u8' in l]
                  if m3u8_links:
                      clean_links = [l for l in m3u8_links if not any(bad in l for bad in ['160p', '240p', '360p'])]
                      target_list = clean_links if clean_links else m3u8_links
                      best = [l for l in target_list if '1080' in l]
                      if not best: best = [l for l in target_list if '720' in l]
                      if not best: best = target_list
                      print(best[0])
                  else:
                      print("NOT_FOUND")
          EOF

          DIRECT_LINK=$(python3 scraper.py "${{ github.event.inputs.url }}")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ لینکی یافت نشد. ممکن است سایت دارای سیستم ضد-ربات ابری باشد."
            exit 1
          fi
          
          echo "✅ LINK FOUND: $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: High-Speed Download Execution
        run: |
          echo "🚀 Step 2: Executing High-Speed Download Engine..."
          
          if [[ "${{ env.DIRECT_LINK }}" == *".mp4"* ]]; then
            echo "🎬 Direct MP4 detected! Unleashing Aria2c with 16 Threads..."
            yt-dlp \
              --downloader aria2c \
              --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
              --referer "${{ github.event.inputs.url }}" \
              --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1" \
              --no-check-certificate \
              -o "video_raw.mp4" \
              "${{ env.DIRECT_LINK }}"
          else
            echo "🎥 HLS Playlist fallback. Using Native Downloader..."
            yt-dlp \
              -N 16 \
              --downloader "m3u8:native" \
              --referer "${{ github.event.inputs.url }}" \
              --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1" \
              --no-check-certificate \
              --remux-video mp4 \
              -o "video_dl.%(ext)s" \
              "${{ env.DIRECT_LINK }}"
              
            mv video_dl.* video_raw.mp4
          fi

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            echo "✅ Fixing video timestamps and timeline index..."
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ فایل دانلود نشده است."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          echo "✂️ Splitting files into 90MB chunks..."
          FOLDER_NAME="downloads/yeptube-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to GitHub Code
        run: |
          echo "📤 Uploading to Repository..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "🚀 HQ Bypass Download: ${{ github.run_id }}"
          git push
