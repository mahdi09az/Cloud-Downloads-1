name: 🧪 WAF Buster Test (Header Clone Engine)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس اصلی صفحه ویدیو (تست EroASMR)'
        required: true
      quality:
        description: 'کیفیت دانلود'
        required: true
        type: choice
        options:
          - best
          - 720
          - 480
          - 360
          - lowest
        default: best

permissions:
  contents: write

jobs:
  test_waf_bypass:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y python3 python3-pip
          python3 -m pip install playwright curl_cffi
          python3 -m playwright install --with-deps chromium

      - name: Sniff Network & Clone Exact Headers
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
        run: |
          echo "🚀 Step 1: Sniffing network for $INPUT_QUALITY quality & Cloning Headers..."
          
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys, json

          target_url = sys.argv[1]
          target_q = sys.argv[2]
          found_links = set()
          cloned_headers = {}

          def handle_response(response):
              try:
                  url = response.url
                  if ('.mp4' in url or '.m3u8' in url):
                      if 'preview' not in url.lower() and 'thumb' not in url.lower() and 'teaser' not in url.lower():
                          found_links.add(url)
                          # 💡 ترفند اصلی: کپی کردن دقیق تمام هدرهای شبکه مرورگر
                          cloned_headers[url] = response.request.all_headers()
              except:
                  pass

          with sync_playwright() as p:
              # استفاده از مرورگر دسکتاپ کروم برای هماهنگی ۱۰۰٪ با موتور دانلود ما
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/110.0.0.0 Safari/537.36"
              )
              page = context.new_page()
              page.on("response", handle_response)
              
              try:
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  # کلیک روی پلیر برای شروع پخش و دریافت هدرهای ویدیویی
                  page.mouse.click(200, 200)
                  page.wait_for_timeout(6000)
              except:
                  pass
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              mp4_links = [l for l in found_links if '.mp4' in l and 'preview' not in l.lower()]
              if mp4_links:
                  hq_links = [l for l in mp4_links if 'hq' in l.lower()]
                  lq_links = [l for l in mp4_links if 'lq' in l.lower()]
                  
                  if target_q in ['best', '720']:
                      best_link = max(hq_links if hq_links else mp4_links, key=len)
                  elif target_q in ['lowest', '360', '480']:
                      best_link = max(lq_links if lq_links else mp4_links, key=len)
                  else:
                      best_link = max(mp4_links, key=len)
                      
                  print(best_link)
                  
                  # ذخیره هدرهای دقیق همین لینک برای موتور دانلود
                  with open('headers.json', 'w', encoding='utf-8') as f:
                      json.dump(cloned_headers.get(best_link, {}), f)
              else:
                  print("NOT_FOUND") # در این تست تمرکز فقط روی MP4 است
          EOF

          DIRECT_LINK=$(python3 scraper.py "$INPUT_URL" "$INPUT_QUALITY")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ لینکی یافت نشد."
            exit 1
          fi
          
          echo "✅ LINK FOUND: $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: Execute Stealth Download (With Cloned Headers)
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          echo "🚀 Step 2: Engaging Stealth Downloader with Cloned Identity..."
          
          cat << 'EOF' > custom_downloader.py
          import sys, os, json
          from curl_cffi import requests
          from concurrent.futures import ThreadPoolExecutor

          url = sys.argv[1]
          
          with open('headers.json', 'r') as f:
              headers = json.load(f)

          # پاکسازی هدرهایی که در دانلود دستی اختلال ایجاد می‌کنند
          for k in ['range', 'accept-encoding', 'content-length']:
              headers.pop(k, None)
              headers.pop(k.lower(), None)

          print("📡 Doing a stealth GET using exact Browser Headers...")
          # هماهنگی دقیق با مرورگر کروم نسخه ۱۱۰
          session = requests.Session(impersonate="chrome110")
          
          resp = session.get(url, headers=headers, stream=True)
          
          if resp.status_code >= 400:
              print(f"❌ WAF Blocked us! Status: {resp.status_code}")
              sys.exit(1)

          file_size = int(resp.headers.get("Content-Length", 0))
          resp.close()

          if file_size == 0:
              print("⚠️ File size unknown. Downloading single-thread...")
              r = session.get(url, headers=headers, stream=True)
              with open("video_raw.mp4", "wb") as f:
                  for chunk in r.iter_content(chunk_size=1024*1024):
                      if chunk: f.write(chunk)
              print("🎉 Download Finished!")
              sys.exit(0)

          print(f"✅ WAF Successfully Bypassed! Target Size: {file_size / (1024*1024):.2f} MB")
          print("⚡ Engaging 16 concurrent threads...")
          
          threads = 16
          chunk_size = file_size // threads
          ranges = []
          for i in range(threads):
              start = i * chunk_size
              end = start + chunk_size - 1 if i < threads - 1 else file_size - 1
              ranges.append((start, end, i))

          def download_chunk(rng):
              start, end, idx = rng
              h = headers.copy()
              h["Range"] = f"bytes={start}-{end}"
              for attempt in range(3):
                  try:
                      r = session.get(url, headers=h, stream=True, timeout=15)
                      with open(f"part_{idx}", "wb") as f:
                          for chunk in r.iter_content(chunk_size=1024*1024):
                              if chunk: f.write(chunk)
                      print(f"✅ Chunk {idx+1}/16 complete.")
                      break
                  except Exception as e:
                      pass

          with ThreadPoolExecutor(max_workers=threads) as executor:
              executor.map(download_chunk, ranges)

          print("🔗 Assembling video fragments...")
          with open("video_raw.mp4", "wb") as outfile:
              for i in range(threads):
                  part_file = f"part_{i}"
                  if os.path.exists(part_file):
                      with open(part_file, "rb") as infile:
                          outfile.write(infile.read())
                      os.remove(part_file)
                      
          print("🎉 16-Thread Download Finished! Stealth engine is fully operational.")
          EOF
          
          python3 custom_downloader.py "${{ env.DIRECT_LINK }}"
          
          # تایید حجم فایل واقعی
          ls -lh video_raw.mp4
