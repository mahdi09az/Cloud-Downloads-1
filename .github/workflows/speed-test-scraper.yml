name: 🧪 WAF Buster Test (With Guaranteed Playwright Fallback)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس اصلی صفحه ویدیو (تست EroASMR)'
        required: true
      quality:
        description: 'کیفیت دانلود'
        required: true
        type: choice
        options:
          - best
          - 720
          - 480
          - 360
          - lowest
        default: best

permissions:
  contents: write

jobs:
  test_waf_bypass:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y python3 python3-pip
          python3 -m pip install playwright curl_cffi
          python3 -m playwright install --with-deps chromium

      - name: Extract Link & Live Cookies
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
        run: |
          echo "🚀 Step 1: Sniffing network for $INPUT_QUALITY quality..."
          
          cat << 'EOF' > scraper.py
          from playwright.sync_api import sync_playwright
          import sys, json

          target_url = sys.argv[1]
          target_q = sys.argv[2]
          found_links = set()

          def handle_response(response):
              try:
                  url = response.url
                  if ('.mp4' in url or '.m3u8' in url):
                      if 'preview' not in url.lower() and 'thumb' not in url.lower() and 'teaser' not in url.lower():
                          found_links.add(url)
              except:
                  pass

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              iphone_13 = p.devices['iPhone 13']
              context = browser.new_context(**iphone_13)
              page = context.new_page()
              page.on("response", handle_response)
              
              try:
                  page.goto(target_url, wait_until="networkidle", timeout=45000)
                  video_src = page.evaluate('() => { const v = document.querySelector("video"); return v ? v.src : null; }')
                  if video_src and '.mp4' in video_src:
                      found_links.add(video_src)
                  page.mouse.click(200, 200)
                  page.wait_for_timeout(5000)
              except:
                  pass
              
              cookies = context.cookies()
              
              # ذخیره کوکی‌ها برای موتور ۱۶ هسته‌ای
              cookie_str = "; ".join([f"{c['name']}={c['value']}" for c in cookies])
              with open('pw_cookie_header.txt', 'w', encoding='utf-8') as f:
                  f.write(cookie_str)
                  
              # ذخیره کوکی‌ها برای نقشه جایگزین (Playwright)
              with open('pw_cookies.json', 'w', encoding='utf-8') as f:
                  json.dump(cookies, f)
              
              browser.close()

          if not found_links:
              print("NOT_FOUND")
          else:
              mp4_links = [l for l in found_links if '.mp4' in l and 'preview' not in l.lower()]
              if mp4_links:
                  hq_links = [l for l in mp4_links if 'hq' in l.lower()]
                  lq_links = [l for l in mp4_links if 'lq' in l.lower()]
                  
                  if target_q in ['best', '720']:
                      print(max(hq_links if hq_links else mp4_links, key=len))
                  elif target_q in ['lowest', '360', '480']:
                      print(max(lq_links if lq_links else mp4_links, key=len))
                  else:
                      print(max(mp4_links, key=len))
              else:
                  print("NOT_FOUND")
          EOF

          DIRECT_LINK=$(python3 scraper.py "$INPUT_URL" "$INPUT_QUALITY")
          
          if [ "$DIRECT_LINK" == "NOT_FOUND" ] || [ "$DIRECT_LINK" == "ERROR" ]; then
            echo "❌ لینکی یافت نشد."
            exit 1
          fi
          
          echo "✅ LINK FOUND: $DIRECT_LINK"
          echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

      - name: Execute Stealth Download (With Fallback Guarantee)
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          echo "🚀 Step 2: Engaging Stealth Downloader..."
          
          cat << 'EOF' > custom_downloader.py
          import sys, os, json
          from curl_cffi import requests
          from concurrent.futures import ThreadPoolExecutor

          url = sys.argv[1]
          referer = sys.argv[2]
          with open('pw_cookie_header.txt', 'r') as f:
              cookie = f.read().strip()

          ua = "Mozilla/5.0 (iPhone; CPU iPhone OS 15_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.5 Mobile/15E148 Safari/604.1"

          headers = {
              "User-Agent": ua,
              "Referer": referer,
              "Cookie": cookie,
              "Accept": "*/*"
          }

          print("📡 Doing a stealth GET to check WAF status...")
          # تطبیق دقیق اثر انگشت شبکه با گوشی‌های اپل
          session = requests.Session(impersonate="safari15_5")
          
          resp = session.get(url, headers=headers, stream=True)
          
          # 🚨 نقشه جایگزین (Plan B): اگر کلودفلر باز هم مچ‌گیری کرد
          if resp.status_code >= 400:
              print(f"⚠️ WAF Blocked 16-Thread Engine (Status {resp.status_code}). Deploying Ultimate Playwright Fallback!")
              from playwright.sync_api import sync_playwright
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(user_agent=ua)
                  # تزریق مجدد کوکی‌های اصلی
                  with open('pw_cookies.json', 'r') as f:
                      context.add_cookies(json.load(f))
                  print("⏳ Bypassing Firewall via Core Browser Engine... Downloading directly (Please wait 1-3 minutes)...")
                  # دانلود مستقیم و یکپارچه با موتور خود مرورگر (۱۰۰٪ تضمینی)
                  res = context.request.get(url, headers={"Referer": referer}, timeout=0)
                  with open("video_raw.mp4", "wb") as f:
                      f.write(res.body())
              print("🎉 Guaranteed Download Finished via Playwright!")
              sys.exit(0)

          # اگر فایروال گول خورد و موتور ۱۶ هسته‌ای اجازه ورود یافت:
          file_size = int(resp.headers.get("Content-Length", 0))
          resp.close()

          if file_size == 0:
              print("⚠️ File size unknown. Using single-thread fallback...")
              r = session.get(url, headers=headers, stream=True)
              with open("video_raw.mp4", "wb") as f:
                  for chunk in r.iter_content(chunk_size=1024*1024):
                      if chunk: f.write(chunk)
              print("🎉 Download Finished!")
              sys.exit(0)

          print(f"✅ WAF Bypassed! Target Size: {file_size / (1024*1024):.2f} MB")
          print("⚡ Engaging 16 concurrent threads...")
          
          threads = 16
          chunk_size = file_size // threads
          ranges = []
          for i in range(threads):
              start = i * chunk_size
              end = start + chunk_size - 1 if i < threads - 1 else file_size - 1
              ranges.append((start, end, i))

          def download_chunk(rng):
              start, end, idx = rng
              h = headers.copy()
              h["Range"] = f"bytes={start}-{end}"
              for attempt in range(3):
                  try:
                      r = session.get(url, headers=h, stream=True, timeout=15)
                      with open(f"part_{idx}", "wb") as f:
                          for chunk in r.iter_content(chunk_size=1024*1024):
                              if chunk: f.write(chunk)
                      print(f"✅ Chunk {idx+1}/16 complete.")
                      break
                  except Exception as e:
                      pass

          with ThreadPoolExecutor(max_workers=threads) as executor:
              executor.map(download_chunk, ranges)

          print("🔗 Assembling video fragments...")
          with open("video_raw.mp4", "wb") as outfile:
              for i in range(threads):
                  part_file = f"part_{i}"
                  if os.path.exists(part_file):
                      with open(part_file, "rb") as infile:
                          outfile.write(infile.read())
                      os.remove(part_file)
                      
          print("🎉 16-Thread Download Finished! Stealth engine is fully operational.")
          EOF
          
          python3 custom_downloader.py "${{ env.DIRECT_LINK }}" "$INPUT_URL"
          ls -lh video_raw.mp4
