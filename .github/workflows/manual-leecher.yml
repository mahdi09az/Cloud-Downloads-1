name: 🛠️ Manual m3u8 & Direct Leecher (High Speed)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم mp4 یا m3u8'
        required: true
      referer:
        description: 'آدرس سایت اصلی (Referer)'
        required: false
        default: 'https://www.google.com/'

permissions:
  contents: write

jobs:
  manual_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nightly Engine & Aria2
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full python3-pip aria2
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"

      - name: Direct Download (Multi-threaded)
        env:
          COOKIES_TXT: ${{ secrets.PH_COOKIES }}
        run: |
          echo "$COOKIES_TXT" > cookies.txt
          
          echo "🚀 Downloading: ${{ github.event.inputs.url }}"
          
          # اضافه شدن allow-unplayable-formats برای دور زدن ارور پسوند php
          # حذف اجبار برای انتخاب فرمت خاص جهت پایداری در لینک‌های مستقیم
          yt-dlp \
            --impersonate "chrome" \
            --cookies cookies.txt \
            --referer "${{ github.event.inputs.referer }}" \
            --downloader aria2c \
            --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
            --allow-unplayable-formats \
            --no-check-certificate \
            -o "video_raw.mp4" \
            "${{ github.event.inputs.url }}"
          
          echo "✅ Rebuilding video index..."
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          rm video_raw.mp4

      - name: Split to 90MB Parts
        run: |
          FOLDER_NAME="downloads/manual-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4
          rm -f cookies.txt

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Manual download fixed: ${{ github.run_id }}"
          git push
