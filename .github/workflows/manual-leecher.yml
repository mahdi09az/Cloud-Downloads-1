name: 🛠️ Manual Direct Leecher (Aria2 Engine - Pro)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم (mp4, php, m3u8 و غیره)'
        required: true
      referer:
        description: 'آدرس دقیق صفحه‌ای که ویدیو را در آن دیدید'
        required: true

permissions:
  contents: write

jobs:
  manual_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2

      - name: Force Download with Aria2 (With Cookies)
        env:
          COOKIES_TXT: ${{ secrets.PH_COOKIES }}
        run: |
          # ذخیره کوکی‌ها برای استفاده در aria2
          echo "$COOKIES_TXT" > aria2_cookies.txt
          
          echo "🚀 Starting Secure Download..."
          
          # اضافه کردن فلگ load-cookies برای عبور از سد 403
          aria2c -x 16 -s 16 -k 1M \
            --load-cookies="aria2_cookies.txt" \
            --referer="${{ github.event.inputs.referer }}" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
            --check-certificate=false \
            -o "video_raw.mp4" \
            "${{ github.event.inputs.url }}"

      - name: Fix Video Index (FastStart)
        run: |
          if [ -f video_raw.mp4 ]; then
            ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
            rm video_raw.mp4
          else
            echo "❌ فایل دانلود نشده است."
            exit 1
          fi

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/manual-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4
          rm -f aria2_cookies.txt

      - name: Push to GitHub Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Manual Aria2 Pro Download: ${{ github.run_id }}"
          git push
