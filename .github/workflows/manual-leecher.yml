name: 🛠️ Manual m3u8 & Direct Leecher

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم m3u8 یا لینک استخراج شده از افزونه'
        required: true
      referer:
        description: 'آدرس سایت اصلی (Referer) برای دور زدن ارور 403'
        required: false
        default: 'https://www.google.com/'

permissions:
  contents: write

jobs:
  manual_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nightly Engine
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full python3-pip
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"

      - name: Direct Download and Fix
        env:
          COOKIES_TXT: ${{ secrets.PH_COOKIES }}
        run: |
          # ساخت فایل کوکی (در صورت نیاز سایت)
          echo "$COOKIES_TXT" > cookies.txt
          
          echo "🚀 Downloading Direct Link: ${{ github.event.inputs.url }}"
          echo "🔗 Using Referer: ${{ github.event.inputs.referer }}"
          
          # دانلود با پارامترهای دستی و جعل هویت دقیق
          yt-dlp \
            --impersonate "chrome" \
            --cookies cookies.txt \
            --referer "${{ github.event.inputs.referer }}" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            -o "video_raw.mp4" \
            "${{ github.event.inputs.url }}"
          
          # بازسازی ایندکس برای حل مشکل جلو/عقب زدن ویدیو
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          rm video_raw.mp4

      - name: Split to 90MB Parts
        run: |
          FOLDER_NAME="downloads/manual-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          # فشرده‌سازی آنی و تکه‌تکه کردن
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4
          rm -f cookies.txt

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Manual upload: ${{ github.run_id }}"
          git push
