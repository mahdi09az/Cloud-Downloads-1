name: 🛠️ Manual Direct Leecher (Aria2 Engine)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم (mp4, php, m3u8 و غیره)'
        required: true
      referer:
        description: 'آدرس سایت اصلی (Referer)'
        required: false
        default: 'https://www.google.com/'

permissions:
  contents: write

jobs:
  manual_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full aria2

      - name: Force Download with Aria2
        run: |
          echo "🚀 Starting High-Speed Download..."
          # استفاده از aria2c برای دور زدن محدودیت‌های پسوند و افزایش سرعت
          aria2c -x 16 -s 16 -k 1M \
            --referer="${{ github.event.inputs.referer }}" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
            --check-certificate=false \
            -o "video_raw.mp4" \
            "${{ github.event.inputs.url }}"

      - name: Fix Video Index (FastStart)
        run: |
          echo "✅ Fixing video timestamps and timeline index..."
          # بازسازی فایل برای قابلیت جلو/عقب بردن ویدیو
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          rm video_raw.mp4

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/manual-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          # فشرده‌سازی و پارت‌بندی 90 مگابایتی
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          rm video_final.mp4

      - name: Push to GitHub Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Manual Aria2 Download: ${{ github.run_id }}"
          git push
