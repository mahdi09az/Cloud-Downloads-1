name: HLS to Repo Splitter (Final Fixed Version)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک اصلی صفحه ویدیو (URL مرورگر)'
        required: true

permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies & curl-cffi
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full python3-pip
          # نصب نسخه توسعه‌دهندگان برای دور زدن آخرین تغییرات سایت
          python3 -m pip install -U "yt-dlp[default,curl-cffi]@git+https://github.com/yt-dlp/yt-dlp.git"

      - name: Download, Merge and Fix Index
        env:
          COOKIES_TXT: ${{ secrets.PH_COOKIES }}
        run: |
          echo "$COOKIES_TXT" > cookies.txt
          
          # دانلود مسقیم از لینک اصلی با جعل هویت کروم
          yt-dlp --impersonate "chrome" --cookies cookies.txt -f "bestvideo[height<=720]+bestaudio/best" --merge-output-format mp4 -o "video_raw.mp4" "${{ github.event.inputs.url }}"
          
          echo "✅ Fixing video timestamps..."
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          
          rm video_raw.mp4

      - name: Split and Prepare Files
        run: |
          FOLDER_NAME="downloads/video-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          
          rm video_final.mp4
          rm -f cookies.txt

      - name: Commit and Push to GitHub Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Upload video parts for run ${{ github.run_id }}"
          git push
