name: HLS to Repo Splitter (Raw File Method)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک صفحه ویدیو یا لینک استخراج شده'
        required: true

permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yt-dlp, FFMPEG & 7zip
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full

      - name: Download and Merge Video
        run: |
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best" --merge-output-format mp4 -o "video_final.mp4" "${{ github.event.inputs.url }}"

      - name: Split and Prepare Files (Instant Mode)
        run: |
          FOLDER_NAME="downloads/video-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          
          # استفاده از پسوند 7z برای جلوگیری از ارور
          # اضافه شدن mx=0 برای تکه‌تکه کردن سریع و بدون افت زمان
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          
          rm video_final.mp4

      - name: Commit and Push to GitHub Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Upload video parts for run ${{ github.run_id }}"
          git push
