name: Ultimate Video Leecher (m3u8/HLS/DASH)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک صفحه ویدیو یا لینک m3u8'
        required: true

jobs:
  download_process:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp & FFMPEG
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download and Merge
        run: |
          # استفاده از آرگومان‌های بهینه برای چسباندن تیکه‌ها به هم
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best" --merge-output-format mp4 -o "video_final.mp4" "${{ github.event.inputs.url }}"

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "video-${{ github.run_id }}"
          files: video_final.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

