name: HLS to Repo Splitter (Ultimate Bypass + Index Fix)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک اصلی صفحه ویدیو (URL مرورگر)'
        required: true

permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies & curl-cffi bypass
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg p7zip-full python3-pip
          # نصب yt-dlp به همراه ماژول‌های پیشرفته دور زدن کلودفلر
          python3 -m pip install --upgrade "yt-dlp[default,curl-cffi]"

      - name: Download, Merge and Fix Index
        env:
          COOKIES_TXT: ${{ secrets.PH_COOKIES }}
        run: |
          # ساخت فایل کوکی
          echo "$COOKIES_TXT" > cookies.txt
          
          RAW_URL="${{ github.event.inputs.url }}"
          FINAL_URL="$RAW_URL"
          
          # تبدیل خودکار لینک معمولی به لینک Embed برای دور زدن قطعی فیلتر امنیتی
          if [[ "$RAW_URL" == *"viewkey="* ]]; then
              VIEWKEY=$(echo "$RAW_URL" | grep -oP 'viewkey=\K[^&]+')
              FINAL_URL="https://www.pornhub.com/embed/$VIEWKEY"
              echo "✅ Converted to Embed format: $FINAL_URL"
          fi
          
          # مرحله اول: دانلود ویدیو با نام خام (جعل هویت کروم + اعمال کوکی + محدودیت 720p)
          yt-dlp --impersonate "chrome" --cookies cookies.txt -f "bestvideo[height<=720]+bestaudio/best" --merge-output-format mp4 -o "video_raw.mp4" "$FINAL_URL"
          
          # مرحله دوم: کپی کردن استریم بدون افت کیفیت و بازسازی ایندکس زمان‌بندی برای امکان پرش در ویدیو
          echo "✅ Fixing video timestamps and timeline index..."
          ffmpeg -i video_raw.mp4 -c copy -movflags +faststart video_final.mp4
          
          # حذف فایل خام اولیه
          rm video_raw.mp4

      - name: Split and Prepare Files
        run: |
          # ساخت پوشه اختصاصی
          FOLDER_NAME="downloads/video-${{ github.run_id }}"
          mkdir -p "$FOLDER_NAME"
          
          # تکه‌تکه کردن سریع ویدیو به پارت‌های 90 مگابایتی
          7z a -mx=0 -v90m "$FOLDER_NAME/video.7z" video_final.mp4
          
          # پاک‌سازی فایل‌های موقت
          rm video_final.mp4
          rm -f cookies.txt

      - name: Commit and Push to GitHub Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Upload video parts for run ${{ github.run_id }}"
          git push
